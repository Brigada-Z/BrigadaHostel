<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Brigada Hostel</title>
    <link rel="stylesheet" href="../../../style/dashboard.css">
</head>
<body class="auth-body">
    <!-- CONTENEDOR PRINCIPAL: Centra la tarjeta de recuperación en pantalla -->
    <div class="auth-wrapper">
        <div class="auth-card">
            <!-- IDENTIDAD VISUAL: Logo corporativo de Brigada Hostel -->
            <div class="brand-logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
            </div>

            <!-- ENCABEZADO: Título y breve instrucción para el usuario -->
            <div class="auth-header">
                <h1>Recuperar Acceso</h1>
                <p>Ingresa tu usuario para recibir instrucciones</p>
            </div>

            <!-- FORMULARIO DE RECUPERACIÓN: Acción simulada que redirige al login tras "enviar" -->
            <form action="loginDashboard.html">
                <div class="form-group">
                    <label class="auth-label">Usuario</label>
                    <input type="text" class="input-field" placeholder="1234" required>
                </div>
                <!-- BOTÓN DE ACCIÓN: Dispara el proceso de envío de instrucciones -->
                <button type="submit" class="btn-submit mt-24">
                    Enviar Instrucciones
                </button>
            </form>

            <!-- NAVEGACIÓN SECUNDARIA: Permite retornar al flujo de inicio de sesión -->
            <div class="auth-footer"><a href="loginDashboard.html">Volver al login</a></div>
        </div>
    </div>

    <!-- ACCESO RÁPIDO: Botón flotante para regresar al sitio web público -->
    <a href="../../index.html" class="back-home" title="Volver al inicio">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
    </a>
</body>
</html>
