<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Login</title>
    <link rel="stylesheet" href="../../../style/dashboard.css">
</head>
<body class="auth-body">
    <!-- CONTENEDOR PRINCIPAL DE AUTENTICACIÓN (Caso de Uso: Iniciar/Registrar Sesion.)-->
    <div class="auth-wrapper">
        <div class="auth-card">
            <!-- LOGO DE LA MARCA -->
            <div class="brand-logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
            </div>

            <!-- ENCABEZADO DE LA TARJETA -->
            <div class="auth-header">
                <h1>Acceso al Panel</h1>
                <p>Ingresa tus datos para continuar</p>
            </div>

            <!-- FORMULARIO DE ACCESO -->
            <form action="../dashboard.html">
                <div class="form-group">
                    <label class="auth-label">Usuario</label>
                    <input type="text" class="input-field" placeholder="1234" pattern="1234" title="Ingresa 1234" required>
                </div>
                <div class="form-group mt-20">
                    <label class="auth-label">Contraseña</label>
                    <input type="password" class="input-field" placeholder="••••" pattern="1234" title="Ingresa 1234" required>
                    <a href="forgotPassword.html" class="forgot-password">¿Olvidaste tu contraseña?</a>
                </div>
                <button type="submit" class="btn-submit mt-24">
                    Iniciar sesión 
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </form>

            <!-- PIE DE PÁGINA DE LA TARJETA -->
            <div class="auth-footer">¿No tienes cuenta? <a href="signupDashboard.html">Crear una ahora</a></div>
        </div>
    </div>

    <!-- BOTÓN PARA VOLVER AL HOME -->
    <a href="../../index.html" class="back-home" title="Volver al inicio">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
    </a>
</body>
</html>
